<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#080808">

<title>GYM RAÚL</title>
<script>
const manifest = {
  name: "GYM — Rutina Raúl",
  short_name: "GYM RAÚL",
  start_url: ".", display: "standalone",
  background_color: "#080808", theme_color: "#080808", orientation: "portrait",
  icons: [{ src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%23080808'/%3E%3Ctext x='256' y='330' text-anchor='middle' font-size='300' font-family='Arial'%3E📈%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }]
};
const b = new Blob([JSON.stringify(manifest)],{type:'application/json'});
const l = document.createElement('link'); l.rel='manifest'; l.href=URL.createObjectURL(b); document.head.appendChild(l);
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap');
:root {
  --bg: #080808; --s1: #101010; --s2: #161616; --s3: #1e1e1e;
  --border: #252525; --text: #f0f0f0; --muted: #444; --subtle: #2a2a2a;
  --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased;}
#app{height:100%;display:flex;flex-direction:column;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:rgba(8,8,8,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-shrink:0;min-height:56px;}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:3px;}
.topbar-sub{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;color:var(--muted);margin-top:1px;}
.back-btn{background:none;border:none;color:#777;font-size:22px;cursor:pointer;padding:4px 10px 4px 0;line-height:1;}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:18px 14px 40px;}
::-webkit-scrollbar{display:none;}

/* HOME */
.week-banner{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px 20px;margin-bottom:18px;display:flex;align-items:center;gap:16px;}
.week-ring{flex-shrink:0;}
.week-info-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;}
.week-info-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.week-date{font-size:11px;color:#333;margin-top:5px;letter-spacing:1px;}
.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.day-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px 14px;cursor:pointer;transition:transform 0.18s,border-color 0.2s;position:relative;overflow:hidden;-webkit-user-select:none;user-select:none;}
.day-card:active{transform:scale(0.96);}
.dc-glow{position:absolute;inset:0;pointer-events:none;opacity:.06;}
.dc-day{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;color:var(--muted);margin-bottom:5px;}
.dc-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:23px;line-height:1.05;}
.dc-sub{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:14px;color:#666;margin-bottom:10px;}
.dc-meta{font-size:10px;color:#333;margin-bottom:8px;}
.pbar-bg{background:var(--border);border-radius:4px;height:3px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:4px;transition:width .4s;}
.pbar-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;margin-top:4px;}

/* WORKOUT */
.hero{border-radius:18px;padding:22px 18px;margin-bottom:20px;position:relative;overflow:hidden;border:1px solid;}
.hero-day{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:4px;margin-bottom:4px;}
.hero-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:42px;line-height:1;}
.hero-sub{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:#888;}
.hero-stats{display:flex;gap:20px;margin-top:16px;}
.hs-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;}
.hs-key{font-size:9px;color:#3a3a3a;letter-spacing:2px;margin-top:1px;}

.group-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:6px;}
.group-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:4px;font-weight:700;}
.group-line{flex:1;height:1px;background:var(--border);}

.ex-card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:14px 13px;margin-bottom:9px;transition:opacity .3s;}
.ex-card.done{opacity:.5;}
.ex-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:.3px;line-height:1.2;}
.ex-name.crossed{text-decoration:line-through;color:#3a3a3a;}
.ex-note{font-size:10px;color:#3a3a3a;margin-top:2px;font-style:italic;}
.ex-schema{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1px;margin-top:3px;}
.timer-btn{background:transparent;border:1px solid var(--border);border-radius:7px;padding:5px 8px;cursor:pointer;font-size:13px;color:#444;flex-shrink:0;line-height:1;}

/* SETS TABLE */
.sets-table{width:100%;border-collapse:collapse;margin-top:2px;}
.sets-table th{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;color:var(--muted);text-align:left;padding:0 6px 6px 0;font-weight:600;}
.sets-table th:last-child{text-align:center;}
.sets-table td{padding:3px 6px 3px 0;vertical-align:middle;}
.set-num{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:#333;width:22px;}
.weight-input{background:var(--s3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;width:80px;padding:7px 8px;text-align:center;-webkit-appearance:none;appearance:none;}
.weight-input:focus{outline:none;border-color:#555;}
.weight-input.has-val{border-color:#333;}
.kg-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);margin-left:4px;}
.done-btn{width:38px;height:38px;border-radius:9px;border:2px solid var(--border);background:transparent;color:#444;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.done-btn.set-done{color:#000;}
.prev-weight{font-size:10px;color:#2a2a2a;margin-top:2px;font-style:italic;}

/* HISTORY VIEW */
.hist-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;}
.hist-date{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;color:var(--muted);margin-bottom:10px;}
.hist-ex{margin-bottom:10px;}
.hist-ex-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;margin-bottom:5px;}
.hist-sets{display:flex;flex-wrap:wrap;gap:6px;}
.hist-set-chip{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:4px 10px;font-family:'Barlow Condensed',sans-serif;font-size:13px;color:#888;}
.hist-set-chip.has-w{color:var(--text);}

/* COMPLETE */
.complete-banner{text-align:center;padding:30px 20px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}

/* NAV TABS */
.nav-tabs{display:flex;gap:0;border-top:1px solid var(--border);flex-shrink:0;background:rgba(8,8,8,0.98);}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 12px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2px;gap:4px;transition:color .2s;}
.nav-tab.active{color:var(--text);}
.nav-tab-icon{font-size:18px;line-height:1;}

/* TIMER */
.timer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.timer-modal{background:#0e0e0e;border:1px solid #2a2a2a;border-radius:24px;padding:32px 28px;text-align:center;width:100%;max-width:320px;}
.t-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:5px;color:#333;margin-bottom:24px;}
.t-presets{display:flex;gap:7px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;}
.t-preset{background:#161616;color:#555;border:1px solid #222;border-radius:7px;padding:7px 13px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;transition:all .2s;}
.t-preset.active{background:#fff;color:#000;border-color:#fff;}
.t-actions{display:flex;gap:9px;}
.t-pause{background:#1a1a1a;color:#fff;border:1px solid #333;border-radius:11px;padding:11px 18px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;flex:1;}
.t-close{background:#c0392b;color:#fff;border:none;border-radius:11px;padding:11px 18px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;flex:1;}

/* SECTION LABEL */
.sec-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:4px;color:#282828;margin-bottom:12px;margin-top:24px;}
.sum-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:16px 18px;}
.sum-row{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.sum-row:last-child{margin-bottom:0;}
.sum-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sum-name{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:#555;min-width:120px;}
.sum-pb{flex:1;background:var(--border);border-radius:3px;height:3px;}
.sum-pf{height:100%;border-radius:3px;transition:width .4s;}
.sum-cnt{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#2a2a2a;min-width:36px;text-align:right;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar" id="topbar">
    <div id="tl"></div>
    <div id="tr"></div>
  </div>
  <div class="content" id="content"></div>
  <div class="nav-tabs" id="navTabs">
    <button class="nav-tab active" id="tab-train" onclick="switchTab('train')">
      <span class="nav-tab-icon">🏋️</span>ENTRENOS
    </button>
    <button class="nav-tab" id="tab-hist" onclick="switchTab('hist')">
      <span class="nav-tab-icon">📊</span>HISTORIAL
    </button>
    <button class="nav-tab" id="tab-stats" onclick="switchTab('stats')">
      <span class="nav-tab-icon">📈</span>STATS
    </button>
    <button class="nav-tab" id="tab-ai" onclick="openAI()">
      <span class="nav-tab-icon">🤖</span>COACH IA
    </button>
  </div>
</div>

<!-- EDIT MODAL -->
<div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:998;flex-direction:column;padding-top:var(--safe-top)">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #222;background:#0a0a0a">
    <div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;letter-spacing:2px" id="editModalTitle">EDITAR DÍA</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;color:#444;margin-top:2px">Toca un campo para editar</div>
    </div>
    <button onclick="closeEdit()" style="background:#1a1a1a;border:1px solid #333;color:#fff;border-radius:10px;padding:8px 14px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;cursor:pointer">✓ GUARDAR</button>
  </div>
  <div id="editContent" style="flex:1;overflow-y:auto;padding:16px 14px 40px;-webkit-overflow-scrolling:touch"></div>
</div>

<!-- AI MODAL -->
<div id="aiModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:998;flex-direction:column;padding-top:var(--safe-top)">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #222;background:#080808">
    <div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;letter-spacing:2px;color:#A78BFA">🤖 COACH IA</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;color:#444;margin-top:2px">ANÁLISIS PERSONALIZADO</div>
    </div>
    <button onclick="closeAI()" style="background:#1a1a1a;border:1px solid #333;color:#aaa;border-radius:10px;padding:8px 14px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;cursor:pointer">✕ CERRAR</button>
  </div>
  <div id="aiContent" style="flex:1;overflow-y:auto;padding:16px 14px 40px;-webkit-overflow-scrolling:touch"></div>
</div>

<div class="timer-overlay" id="timerModal" style="display:none">
  <div class="timer-modal">
    <div class="t-label">⏱ DESCANSO</div>
    <svg id="tSvg" width="130" height="130" style="display:block;margin:0 auto 20px">
      <circle cx="65" cy="65" r="50" fill="none" stroke="#1a1a1a" stroke-width="7"/>
      <circle id="tArc" cx="65" cy="65" r="50" fill="none" stroke="#10B981" stroke-width="7"
        stroke-dasharray="314.2" stroke-dashoffset="0" stroke-linecap="round"
        transform="rotate(-90 65 65)" style="transition:stroke-dashoffset 1s linear,stroke .3s"/>
      <text id="tTxt" x="65" y="72" text-anchor="middle" fill="#fff" font-size="32"
        font-family="'Barlow Condensed',sans-serif" font-weight="700">1:30</text>
    </svg>
    <div class="t-presets">
      <button class="t-preset" onclick="resetTimer(60)">60s</button>
      <button class="t-preset active" onclick="resetTimer(90)">90s</button>
      <button class="t-preset" onclick="resetTimer(120)">2min</button>
      <button class="t-preset" onclick="resetTimer(180)">3min</button>
    </div>
    <div class="t-actions">
      <button class="t-pause" id="tPauseBtn" onclick="toggleTimer()">⏸ PAUSAR</button>
      <button class="t-close" onclick="closeTimer()">✕ CERRAR</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════
const DAYS = [
{
  day:1, title:"HOMBRO", subtitle:"CUÁDRICEPS", emoji:"💪", color:"#F59E0B", accent:"#FCD34D",
  groups:[
    {name:"hombro", exercises:[
      {name:"Elevaciones Laterales", sets:3, reps:"15"},
      {name:"Press Militar", sets:3, reps:"15"},
      {name:"Pájaro", sets:3, reps:"15"},
    ]},
    {name:"cuádriceps", exercises:[
      {name:"Extensión de Cuádriceps", sets:3, reps:"15"},
      {name:"Prensa", sets:6, reps:"15"},
    ]},
  ]
},
{
  day:2, title:"PECTORAL", subtitle:"TRÍCEPS", emoji:"🔥", color:"#E85D2F", accent:"#FF9060",
  groups:[
    {name:"pectoral", exercises:[
      {name:"Press Banca con Barra o Máquina Inclinada", sets:3, reps:"15"},
      {name:"Press Banca Inclinada con Mancuernas", sets:3, reps:"15"},
      {name:"Apertura Inclinada con Mancuernas", sets:3, reps:"15"},
    ]},
    {name:"tríceps", exercises:[
      {name:"Tríceps con Mancuernas", sets:3, reps:"15"},
      {name:"Tríceps Polea con Barra", sets:3, reps:"15"},
      {name:"Tríceps Polea con Cuerda", sets:3, reps:"15"},
    ]},
  ]
},
{
  day:3, title:"FEMORAL", subtitle:"GEMELO", emoji:"🦵", color:"#A855F7", accent:"#D8B4FE",
  groups:[
    {name:"femoral", exercises:[
      {name:"Femoral en Máquina Tumbado Boca Abajo", sets:9, reps:"20"},
    ]},
    {name:"gemelos", exercises:[
      {name:"Gemelos en Máquina de Cuádriceps", sets:9, reps:"20"},
    ]},
  ]
},
{
  day:4, title:"ESPALDA", subtitle:"BÍCEPS", emoji:"⚡", color:"#3B82F6", accent:"#93C5FD",
  groups:[
    {name:"espalda", exercises:[
      {name:"Jalón Tras Nuca con Polea", sets:3, reps:"15", note:"Sentado, barra detrás de la cabeza"},
      {name:"Tirón al Pecho con Polea", sets:3, reps:"15", note:"Sentado, tiras hacia el apex"},
      {name:"Pájaro", sets:3, reps:"15"},
    ]},
    {name:"bíceps", exercises:[
      {name:"Bíceps Concentrado con Mancuerna", sets:3, reps:"15", note:"Codo apoyado en pierna"},
      {name:"Bíceps con Barra en Polea", sets:3, reps:"15"},
      {name:"Bíceps con Cuerda en Polea", sets:3, reps:"15"},
    ]},
  ]
},
];


// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let S = {
  view: 'train',
  activeDay: null,
  tab: 'train',
  progress: load('gymRaul_progress') || {},
  weights: load('gymRaul_weights') || {},
  history: load('gymRaul_history') || [],
  customDays: load('gymRaul_customDays') || null,
};

// Merge custom days into DAYS on load
function applyCustomDays(){
  if(!S.customDays) return;
  S.customDays.forEach((cd,di)=>{ if(cd && DAYS[di]) DAYS[di].groups=cd; });
}

function load(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){return null;} }
function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function saveAll(){ save('gymRaul_progress',S.progress); save('gymRaul_weights',S.weights); save('gymRaul_history',S.history); }

function key(di,gi,ei){ return `${di}-${gi}-${ei}`; }
function getCompleted(di,gi,ei){ return S.progress[key(di,gi,ei)] || []; }
function getWeight(di,gi,ei,si){ return S.weights[`${di}-${gi}-${ei}-${si}`] || ''; }

function toggleSet(di,gi,ei,si){
  const k=key(di,gi,ei);
  const cur=S.progress[k]||[];
  S.progress[k]=cur.includes(si)?cur.filter(x=>x!==si):[...cur,si];
  saveAll();
  render();
}

function setWeight(di,gi,ei,si,val){
  S.weights[`${di}-${gi}-${ei}-${si}`]=val;
  saveAll();
}

function getDayPct(di){
  let total=0,done=0;
  DAYS[di].groups.forEach((g,gi)=>g.exercises.forEach((e,ei)=>{
    total+=e.sets; done+=getCompleted(di,gi,ei).length;
  }));
  return total===0?0:done/total;
}

function getTotalSets(di){ return DAYS[di].groups.reduce((a,g)=>a+g.exercises.reduce((b,e)=>b+e.sets,0),0); }

function getLastWeight(exName, setIdx){
  // Find last time this exercise was logged with a weight
  for(let i=S.history.length-1;i>=0;i--){
    const sess=S.history[i];
    const ex=sess.exercises.find(e=>e.name===exName);
    if(ex && ex.sets[setIdx] && ex.sets[setIdx].weight) return ex.sets[setIdx].weight;
  }
  return null;
}

function finishWorkout(di){
  const d=DAYS[di];
  const entry={
    date: new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}),
    day: di, dayTitle: d.title+' / '+d.subtitle,
    exercises: []
  };
  d.groups.forEach((g,gi)=>g.exercises.forEach((e,ei)=>{
    const sets=[];
    for(let si=0;si<e.sets;si++){
      sets.push({ done: getCompleted(di,gi,ei).includes(si), weight: getWeight(di,gi,ei,si) });
    }
    entry.exercises.push({ name:e.name, sets });
  }));
  S.history.unshift(entry);
  if(S.history.length>50) S.history=S.history.slice(0,50);
  saveAll();
}

// ════════════════════════════════════════════
// TIMER
// ════════════════════════════════════════════
let T={s:90,init:90,running:true,iv:null};

function openTimer(){ document.getElementById('timerModal').style.display='flex'; resetTimer(90); }
function closeTimer(){ clearInterval(T.iv); document.getElementById('timerModal').style.display='none'; }
function resetTimer(t){
  clearInterval(T.iv); T.s=t; T.init=t; T.running=true;
  document.querySelectorAll('.t-preset').forEach(b=>b.classList.remove('active'));
  const map={60:'60s',90:'90s',120:'2min',180:'3min'};
  document.querySelectorAll('.t-preset').forEach(b=>{ if(b.textContent===map[t]) b.classList.add('active'); });
  document.getElementById('tPauseBtn').textContent='⏸ PAUSAR';
  T.iv=setInterval(()=>{
    if(T.running&&T.s>0){ T.s--; updateTimerUI(); }
    else if(T.s===0){ clearInterval(T.iv); T.running=false; if(navigator.vibrate)navigator.vibrate([200,100,200]); }
  },1000);
  updateTimerUI();
}
function toggleTimer(){ T.running=!T.running; document.getElementById('tPauseBtn').textContent=T.running?'⏸ PAUSAR':'▶ REANUDAR'; }
function updateTimerUI(){
  const circ=2*Math.PI*50, off=circ*(1-T.s/T.init);
  const arc=document.getElementById('tArc'),txt=document.getElementById('tTxt');
  if(!arc)return;
  arc.style.strokeDashoffset=off;
  arc.style.stroke=T.s>60?'#10B981':T.s>15?'#F59E0B':'#EF4444';
  txt.textContent=`${Math.floor(T.s/60)}:${String(T.s%60).padStart(2,'0')}`;
}

function render(){
  if(S.view==='train') renderHome();
  else if(S.view==='workout') renderWorkout();
  else if(S.view==='hist') renderHistory();
  else if(S.view==='stats') renderStats();
}

function switchTab(t){
  S.tab=t; S.view=t==='train'?'train':t;
  if(t==='train'){ S.activeDay=null; }
  S.histDetail=null;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  render();
}

    <div class="week-date">${today.toUpperCase()}</div></div>
  </div>

  DAYS.forEach((d,i)=>{
    const pct=getDayPct(i), done=pct===1;
    html+=`<div class="day-card" style="border-color:${done?d.color+'55':'#252525'}" onclick="goDay(${i})">
      <div class="dc-glow" style="background:${d.color}"></div>
      <div class="dc-day">DÍA ${d.day} ${d.emoji}</div>
      <div class="dc-title" style="color:${d.color}">${d.title}</div>
      <div class="dc-sub">${d.subtitle}</div>
      <div class="dc-meta">${d.groups.reduce((a,g)=>a+g.exercises.length,0)} ejerc · ${getTotalSets(i)} series</div>
      <div class="pbar-bg"><div class="pbar-fill" style="width:${pct*100}%;background:${d.color}"></div></div>

    </div>`;
  });

  html+=`</div><div class="sec-label">RESUMEN SEMANAL</div><div class="sum-card">`;
  DAYS.forEach((d,i)=>{
    const total=getTotalSets(i);
    let ds=0; d.groups.forEach((g,gi)=>g.exercises.forEach((e,ei)=>{ ds+=getCompleted(i,gi,ei).length; }));
    const p=total===0?0:ds/total;

      <div class="sum-dot" style="background:${d.color}"></div>
      <div class="sum-name">D${d.day} ${d.title} / ${d.subtitle}</div>
      <div class="sum-pb"><div class="sum-pf" style="width:${p*100}%;background:${d.color}"></div></div>
      <div class="sum-cnt">${ds}/${total}</div>

function renderHistory(){
  // Drilling into a session
  if(S.histDetail !== null && S.histDetail !== undefined){
    renderHistoryDetail(S.histDetail);
    return;
  }
  // Drilling into a day group
  if(S.histGroup !== null && S.histGroup !== undefined){
    renderHistoryGroup(S.histGroup);
    return;
  }

  document.getElementById('tl').innerHTML=`<div class="topbar-title">HISTORIAL</div><div class="topbar-sub">${S.history.length} SESIONES TOTALES</div>`;
  document.getElementById('tr').innerHTML='';

  let html='';
  if(S.history.length===0){
    html=`<div style="text-align:center;padding:60px 20px;color:#333">
      <div style="font-size:48px;margin-bottom:14px">📋</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;letter-spacing:3px;color:#2a2a2a">SIN SESIONES AÚN</div>
      <div style="font-size:12px;margin-top:10px;color:#222;line-height:1.6">Completa un entrenamiento y guárdalo.</div>
    </div>`;
  } else {
    // Group by day index
    DAYS.forEach((d,di)=>{
      const sessionsForDay = S.history
        .map((s,idx)=>({...s,_idx:idx}))
        .filter(s=>s.day===di);
      if(sessionsForDay.length===0) return;

      // Max weight overall for this day group
      let bestVol=0;
      sessionsForDay.forEach(sess=>{
        sess.exercises.forEach(ex=>ex.sets.forEach(s=>{ if(s.done&&s.weight) bestVol=Math.max(bestVol,parseFloat(s.weight)||0); }));

            <div style="font-family:'Barlow Condensed',sans-serif;font-size:9px;color:${d.accent};letter-spacing:2px">DÍA</div>
            <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:${d.color};line-height:1">${d.day}</div>
          </div>

              ${bestVol>0?`<span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:${d.accent}">Máx ${bestVol}kg</span>`:''}
            </div>
          </div>
          <div style="color:#2a2a2a;font-size:22px;padding-right:2px">›</div>

function renderStats(){
  document.getElementById('tl').innerHTML=`<div class="topbar-title">ESTADÍSTICAS</div><div class="topbar-sub">PROGRESIÓN DE PESOS</div>`;
  document.getElementById('tr').innerHTML='';

  // Build per-exercise full history
  const exMap={};
  // Reverse so oldest first for chart order
  [...S.history].reverse().forEach(sess=>{
    const d=DAYS[sess.day];
    sess.exercises.forEach(ex=>{
      const weights=ex.sets.map(s=>parseFloat(s.weight)||0).filter(w=>w>0);
      if(weights.length===0) return;
      const maxW=Math.max(...weights);
      const avgW=weights.reduce((a,b)=>a+b,0)/weights.length;
      const vol=weights.reduce((a,b)=>a+b,0);
      if(!exMap[ex.name]) exMap[ex.name]={color:d.color,accent:d.accent,sessions:[]};
      exMap[ex.name].sessions.push({
        date:sess.date.split(',')[0],
        max:maxW, avg:parseFloat(avgW.toFixed(1)), vol:parseFloat(vol.toFixed(1)),
        sets:ex.sets, setsData: ex.sets.map(s=>({weight:parseFloat(s.weight)||0,done:s.done}))
      });
    });
  });

  const exNames=Object.keys(exMap);
  let html='';

  if(exNames.length===0){
    html=`<div style="text-align:center;padding:60px 20px;color:#333">
      <div style="font-size:48px;margin-bottom:14px">📈</div>

    </div>`;
  } else {

    html+=`<div style="background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:16px 18px;margin-bottom:20px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:4px;color:#2a2a2a;margin-bottom:14px">🏆 MEJORES MARCAS</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;
    exNames.forEach(name=>{
      const ex=exMap[name];
      const allMax=Math.max(...ex.sessions.map(s=>s.max));
      html+=`<div style="background:var(--s2);border-radius:10px;padding:10px 11px;border-left:3px solid ${ex.color}">
        <div style="font-size:10px;color:#3a3a3a;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:${ex.color}">${allMax}kg</div>
      </div>`;
    });
    html+=`</div></div>`;

    // Per exercise detail
    exNames.forEach(name=>{
      const ex=exMap[name];
      const sessions=ex.sessions; // oldest→newest
      const last=sessions[sessions.length-1];
      const prev=sessions.length>1?sessions[sessions.length-2]:null;
      const allMax=Math.max(...sessions.map(s=>s.max));
      const firstMax=sessions[0].max;
      const lastMax=last.max;
      const improvement=((lastMax-firstMax)/firstMax*100).toFixed(0);
      const trend=prev?(lastMax>prev.max?'↑':lastMax<prev.max?'↓':'→'):null;
      const tColor=trend==='↑'?'#10B981':trend==='↓'?'#EF4444':'#888';

      html+=`<div style="background:var(--s1);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:12px">
        <!-- EX HEADER -->
        <div style="padding:14px 16px 12px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,${ex.color}10 0%,transparent 60%)">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;flex:1;margin-right:8px">${name}</div>
            ${trend?`<div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;color:${tColor};font-weight:900;flex-shrink:0">${trend} ${lastMax}kg</div>`:''}
          </div>
          <div style="display:flex;gap:16px;margin-top:10px">
            <div><div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:${ex.color}">${allMax}kg</div><div style="font-size:9px;color:#333;letter-spacing:1px">MÁXIMO</div></div>

      });
      html+=`</div></div>`;

      // Last session sets breakdown
      html+=`<div style="padding:0 16px 14px">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;color:#2a2a2a;margin-bottom:8px;margin-top:10px">ÚLTIMA SESIÓN · DETALLE SERIES</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">`;
      last.setsData.forEach((s,si)=>{
        html+=`<div style="background:${s.done&&s.weight>0?ex.color+'18':'var(--s2)'};border:1px solid ${s.done&&s.weight>0?ex.color+'33':'var(--border)'};border-radius:8px;padding:6px 9px;text-align:center;min-width:50px">

          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:${s.weight>0?ex.accent:'#252525'}">${s.weight>0?s.weight+'kg':'—'}</div>
          <div style="font-size:9px;color:${s.done?'#10B981':'#2a2a2a'}">${s.done?'✓':'·'}</div>
        </div>`;
      });
      html+=`</div>`;

      // All-time series evolution table if multiple sessions
      if(sessions.length>1){
        const maxSets=Math.max(...sessions.map(s=>s.setsData.length));
        html+=`<div style="font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;color:#2a2a2a;margin:12px 0 8px">EVOLUCIÓN POR SERIE</div>

          html+=`<th style="font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:1px;color:#333;text-align:center;padding:4px 4px">S${si+1}</th>`;
        }
        html+=`</tr></thead><tbody>`;
        sessions.forEach((s,sIdx)=>{
          const isLast=sIdx===sessions.length-1;
          html+=`<tr style="background:${isLast?ex.color+'0d':'transparent'}">
            <td style="font-family:'Barlow Condensed',sans-serif;font-size:9px;color:${isLast?'#fff':'#333'};padding:5px 6px 5px 0;white-space:nowrap">${s.date}</td>`;
          for(let si=0;si<maxSets;si++){
            const sd=s.setsData[si];
            const prevSess=sessions[sIdx-1];
            const prevW=prevSess&&prevSess.setsData[si]?prevSess.setsData[si].weight:null;
            const w=sd?sd.weight:0;
            const up=prevW&&w>prevW, down=prevW&&w<prevW;
            html+=`<td style="text-align:center;padding:5px 4px">
              <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:${w>0?(up?'#10B981':down?'#EF4444':isLast?ex.accent:'#555'):'#252525'}">${w>0?w:'—'}</span>
            </td>`;
          }
          html+=`</tr>`;
        });
        html+=`</tbody></table></div>`;
      }

      html+=`</div></div>`;
    });
  }
  document.getElementById('content').innerHTML=html;
}

// ── LOCAL AI ENGINE ──────────────────────────────
function getExHistory(){
  // Returns {exName: [{date, max, avg, weights}]}
  const map={};
  [...S.history].reverse().forEach(sess=>{
    sess.exercises.forEach(ex=>{
      const ws=ex.sets.map(s=>parseFloat(s.weight)||0).filter(w=>w>0);
      if(!ws.length) return;
      if(!map[ex.name]) map[ex.name]=[];
      map[ex.name].push({
        date:sess.date, day:sess.day,
        max:Math.max(...ws),
        avg:ws.reduce((a,b)=>a+b,0)/ws.length,
        weights:ws, done:ex.sets.filter(s=>s.done).length, total:ex.sets.length
      });
    });
  });
  return map;
}

function nextWeight(w){
  // Suggest next weight based on current
  if(w<10) return w+1.25;
  if(w<30) return w+2.5;
  if(w<60) return w+2.5;
  if(w<100) return w+5;
  return w+5;
}

function section(title,color,content){
  return `<div style="background:var(--s2);border:1px solid ${color}33;border-radius:14px;padding:16px;margin-bottom:12px">
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;color:${color};letter-spacing:2px;margin-bottom:10px">${title}</div>
    <div style="font-size:13px;color:#aaa;line-height:1.8">${content}</div>
  </div>`;
}

function pill(text,color){
  return `<span style="display:inline-block;background:${color}22;border:1px solid ${color}44;border-radius:6px;padding:2px 8px;font-family:'Barlow Condensed',sans-serif;font-size:12px;color:${color};margin:2px">${text}</span>`;
}

function runAnalysis(type){
  const exHist=getExHistory();
  const backBtn=`<button onclick="renderAIHome()" style="background:none;border:none;color:#555;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;cursor:pointer;margin-bottom:18px;display:block">← VOLVER</button>`;
  let html=backBtn;

  if(type==='general'){
    // Overall stats
    const totalSessions=S.history.length;
    const exNames=Object.keys(exHist);
    const improved=exNames.filter(n=>{ const s=exHist[n]; return s.length>1&&s[s.length-1].max>s[0].max; });
    const stalled=exNames.filter(n=>{ const s=exHist[n]; if(s.length<3)return false; const last3=s.slice(-3); return last3.every(x=>x.max===last3[0].max); });
    const totalVol=S.history.reduce((a,sess)=>a+sess.exercises.reduce((b,ex)=>b+ex.sets.reduce((c,s)=>c+(parseFloat(s.weight)||0),0),0),0);

    // Best exercise improvements
    const improvements=exNames.map(n=>{
      const s=exHist[n]; if(s.length<2)return null;
      const pct=((s[s.length-1].max-s[0].max)/s[0].max*100);
      return {name:n,pct,from:s[0].max,to:s[s.length-1].max};
    }).filter(Boolean).sort((a,b)=>b.pct-a.pct);

    html+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="background:#161616;border:1px solid #252525;border-radius:12px;padding:12px;text-align:center">
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;color:#A78BFA">${totalSessions}</div>
        <div style="font-size:9px;color:#333;letter-spacing:1px">SESIONES</div>
      </div>
      <div style="background:#161616;border:1px solid #252525;border-radius:12px;padding:12px;text-align:center">
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;color:#10B981">${improved.length}</div>
        <div style="font-size:9px;color:#333;letter-spacing:1px">MEJORAS</div>
      </div>
      <div style="background:#161616;border:1px solid #252525;border-radius:12px;padding:12px;text-align:center">
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;color:#F59E0B">${stalled.length}</div>
        <div style="font-size:9px;color:#333;letter-spacing:1px">ESTANCADOS</div>
      </div>
    </div>`;

    if(improvements.length>0){
      html+=section('🏆 TOP MEJORAS','#10B981',
        improvements.slice(0,4).map(i=>
          `<div style="display:flex;justify-content:space-between;border-bottom:1px solid #1a1a1a;padding:5px 0">
            <span style="color:#ccc">${i.name}</span>
            <span>${pill(i.from+'kg','#555')} → ${pill(i.to+'kg','#10B981')} <span style="color:#10B981;font-size:11px">+${i.pct.toFixed(0)}%</span></span>
          </div>`
        ).join(''));
    }

    if(stalled.length>0){
      html+=section('⚠️ EJERCICIOS ESTANCADOS','#F59E0B',
        stalled.map(n=>{
          const s=exHist[n];
          return `<div style="padding:4px 0;border-bottom:1px solid #1a1a1a"><span style="color:#ccc">${n}</span> — <span style="color:#F59E0B">${s[s.length-1].max}kg · 3+ sesiones sin subir</span><br><span style="color:#444;font-size:11px">→ Intenta subir 2.5kg o cambia el rango de reps</span></div>`;
        }).join(''));
    }

    // Consistency
    const dayCount=DAYS.map((_,di)=>S.history.filter(s=>s.day===di).length);
    const maxDay=Math.max(...dayCount);
    html+=section('📅 CONSISTENCIA POR DÍA','#3B82F6',
      DAYS.map((d,di)=>{
        const c=dayCount[di];
        const bar=Math.round((c/Math.max(maxDay,1))*80);
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="font-size:11px;color:#555;min-width:80px;white-space:nowrap">${d.title}</span>
          <div style="flex:1;background:#1a1a1a;border-radius:3px;height:6px"><div style="width:${bar}%;height:100%;background:${d.color};border-radius:3px"></div></div>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:13px;color:${d.color};min-width:20px">${c}x</span>
        </div>`;
      }).join(''));

  } else if(type==='progression'){
    const exNames=Object.keys(exHist);
    if(!exNames.length){ html+=`<div style="text-align:center;padding:40px;color:#333">No hay datos suficientes aún.</div>`; }
    else {
      const withProgress=exNames.filter(n=>exHist[n].length>1).sort((a,b)=>{
        const sa=exHist[a], sb=exHist[b];
        const pa=(sa[sa.length-1].max-sa[0].max)/sa[0].max;
        const pb=(sb[sb.length-1].max-sb[0].max)/sb[0].max;
        return pb-pa;
      });

      withProgress.forEach(name=>{
        const sessions=exHist[name];
        const first=sessions[0].max, last=sessions[sessions.length-1].max;
        const diff=last-first, pct=((diff/first)*100).toFixed(0);
        const up=diff>0, same=diff===0;
        const color=up?'#10B981':same?'#F59E0B':'#EF4444';
        const trend=up?'↑':same?'→':'↓';
        const maxAll=Math.max(...sessions.map(s=>s.max));

        html+=`<div style="background:#161616;border:1px solid #252525;border-radius:14px;padding:14px;margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:#ddd">${name}</div>
            <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:${color}">${trend} ${last}kg</div>
          </div>
          <div style="display:flex;align-items:flex-end;gap:4px;height:50px;margin-bottom:8px">
            ${sessions.map((s,i)=>{
              const h=Math.max(6,Math.round((s.max/maxAll)*44));
              const isLast=i===sessions.length-1;
              return `<div style="flex:1;height:${h}px;background:${isLast?color:'#2a2a2a'};border-radius:3px 3px 1px 1px;min-width:10px"></div>`;
            }).join('')}
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#333">
            <span>Inicio: ${first}kg</span>
            <span style="color:${color}">${up?'+':''}${diff}kg (${up?'+':''}${pct}%)</span>
            <span>${sessions.length} sesiones</span>
          </div>
        </div>`;
      });

      const noData=exNames.filter(n=>exHist[n].length<2);
      if(noData.length) html+=section('📋 SIN HISTÓRICO SUFICIENTE','#333',noData.map(n=>`<span style="color:#2a2a2a">${n}</span>`).join(' · '));
    }

  } else if(type==='nextweek'){
    const exNames=Object.keys(exHist);
    if(!exNames.length){ html+=`<div style="text-align:center;padding:40px;color:#333">No hay datos suficientes aún.</div>`; }
    else {
      DAYS.forEach((d,di)=>{
        const dayExs=exNames.filter(n=>exHist[n].some(s=>s.day===di));
        if(!dayExs.length) return;
        html+=`<div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;color:${d.color};margin:14px 0 8px">DÍA ${d.day} · ${d.title}</div>`;
        dayExs.forEach(name=>{
          const sessions=exHist[name];
          const last=sessions[sessions.length-1];
          const prev=sessions.length>1?sessions[sessions.length-2]:null;
          const stalled3=sessions.length>=3&&sessions.slice(-3).every(s=>s.max===last.max);
          const suggested=stalled3?nextWeight(last.max)*1:nextWeight(last.max);
          const action=stalled3?`Lleva ${Math.min(sessions.length,3)} sesiones en ${last.max}kg. Sube a`:'Progresa de';
          const actionColor=stalled3?'#F59E0B':'#10B981';

          html+=`<div style="background:#161616;border:1px solid #252525;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
            <div style="flex:1;margin-right:10px">
              <div style="font-size:13px;color:#ccc;margin-bottom:3px">${name}</div>
              <div style="font-size:11px;color:#444">${action} ${last.max}kg</div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:${actionColor}">${suggested}kg</div>
              <div style="font-size:10px;color:#333">OBJETIVO</div>
            </div>
          </div>`;
        });
      });

      html+=section('💡 CONSEJO','#A78BFA','Si llevas más de 3 sesiones sin subir, intenta hacer una serie extra antes de aumentar el peso. Si completas todas las series limpias, sube 2.5kg la siguiente sesión.');
    }

  } else if(type==='routine'){
    // Analyze volume per muscle group
    const muscleVol={};
    DAYS.forEach(d=>d.groups.forEach(g=>{
      const sets=g.exercises.reduce((a,e)=>a+e.sets,0);
      muscleVol[g.name]=(muscleVol[g.name]||0)+sets;
    }));

    const totalVol=Object.values(muscleVol).reduce((a,b)=>a+b,0);
    const muscles=Object.entries(muscleVol).sort((a,b)=>b[1]-a[1]);

    html+=section('📊 VOLUMEN POR MÚSCULO','#A78BFA',
      muscles.map(([m,s])=>{
        const pct=Math.round(s/totalVol*100);
        const rating=s>=12?'Alto':s>=8?'Óptimo':s>=4?'Bajo':'Muy bajo';
        const color=s>=12?'#F59E0B':s>=8?'#10B981':s>=4?'#3B82F6':'#EF4444';
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
          <span style="font-size:12px;color:#888;min-width:90px;text-transform:capitalize">${m}</span>
          <div style="flex:1;background:#1a1a1a;border-radius:3px;height:6px"><div style="width:${pct*2}%;height:100%;background:${color};border-radius:3px;max-width:100%"></div></div>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:${color};min-width:60px;text-align:right">${s} series</span>
        </div>`;
      }).join(''));

    // Check push/pull balance
    const pushGroups=['pecho','tríceps','hombros'];
    const pullGroups=['espalda','bíceps'];
    const pushVol=pushGroups.reduce((a,m)=>a+(muscleVol[m]||0),0);
    const pullVol=pullGroups.reduce((a,m)=>a+(muscleVol[m]||0),0);
    const ratio=(pushVol/Math.max(pullVol,1)).toFixed(1);
    const balanceOk=ratio>=0.8&&ratio<=1.3;

    html+=section('⚖️ EQUILIBRIO EMPUJE / TIRÓN','#3B82F6',
      `Empuje (pecho+hombros+tríceps): <strong style="color:#E85D2F">${pushVol} series</strong><br>
       Tirón (espalda+bíceps): <strong style="color:#3B82F6">${pullVol} series</strong><br>
       Ratio: <strong style="color:${balanceOk?'#10B981':'#F59E0B'}">${ratio}:1 ${balanceOk?'✓ Equilibrado':'⚠️ Descompensado'}</strong><br>
       ${balanceOk?'Buena distribución entre empuje y tirón.':ratio>1.3?'Tienes más volumen de empuje. Considera añadir 1-2 series más de espalda o bíceps.':'Tienes más volumen de tirón. Puedes añadir algo de pecho o hombros.'}`);

    html+=section('✅ VALORACIÓN GENERAL','#10B981',
      `<strong style="color:#10B981">Rutina de 5 días bien estructurada</strong> para volumen/hipertrofia.<br><br>
       • Frecuencia adecuada para cada grupo muscular<br>
       • Buen rango de reps (6-15) para hipertrofia<br>
       • Pierna dividida en 2 días: óptimo para volumen<br>
       • Brazos dedicados: permite alta especialización<br><br>
       <strong style="color:#F59E0B">Sugerencia:</strong> Asegúrate de descansar al menos 48h entre días que trabajen el mismo grupo.`);

  } else if(type==='lastsession'){
    if(!S.history.length){ html+=`<div style="text-align:center;padding:40px;color:#333">No hay sesiones guardadas aún.</div>`; }
    else {
      const sess=S.history[0];
      const d=DAYS[sess.day];
      let setsOk=0,totalVol=0;
      sess.exercises.forEach(ex=>ex.sets.forEach(s=>{ if(s.done)setsOk++; if(s.done&&s.weight)totalVol+=parseFloat(s.weight)||0; }));
      const totalSets=sess.exercises.reduce((a,ex)=>a+ex.sets.length,0);
      const completionPct=Math.round(setsOk/Math.max(totalSets,1)*100);
      const compColor=completionPct>=90?'#10B981':completionPct>=70?'#F59E0B':'#EF4444';

      html+=`<div style="background:linear-gradient(135deg,${d.color}18,transparent);border:1px solid ${d.color}33;border-radius:14px;padding:16px;margin-bottom:12px">
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:${d.color}">${sess.dayTitle}</div>
        <div style="font-size:11px;color:#333;margin-top:2px">${sess.date}</div>
        <div style="display:flex;gap:16px;margin-top:12px">
          <div><div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:${compColor}">${completionPct}%</div><div style="font-size:9px;color:#333">COMPLETADO</div></div>
          <div><div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:#fff">${setsOk}/${totalSets}</div><div style="font-size:9px;color:#333">SERIES</div></div>
          ${totalVol>0?`<div><div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:${d.color}">${totalVol.toFixed(0)}</div><div style="font-size:9px;color:#333">KG TOTALES</div></div>`:''}
        </div>
      </div>`;

      // Compare vs previous same day
      const prevSameDay=S.history.slice(1).find(s=>s.day===sess.day);
      if(prevSameDay){
        let prevVol=0;
        prevSameDay.exercises.forEach(ex=>ex.sets.forEach(s=>{ if(s.done&&s.weight)prevVol+=parseFloat(s.weight)||0; }));
        const volDiff=totalVol-prevVol;
        html+=section('📊 VS SESIÓN ANTERIOR','#3B82F6',
          `Volumen total: ${pill(prevVol.toFixed(0)+'kg','#555')} → ${pill(totalVol.toFixed(0)+'kg',volDiff>=0?'#10B981':'#EF4444')}<br>
           Diferencia: <strong style="color:${volDiff>=0?'#10B981':'#EF4444'}">${volDiff>=0?'+':''}${volDiff.toFixed(0)}kg</strong><br>
           ${volDiff>0?'✅ Mejoraste el volumen total de esta sesión.':volDiff===0?'→ Mismo volumen que la sesión anterior.':'⚠️ Volumen algo menor. Normal si ajustaste pesos o series.'}`);
      }

      // Exercise feedback
      const feedbacks=sess.exercises.map(ex=>{
        const ws=ex.sets.map(s=>parseFloat(s.weight)||0).filter(w=>w>0);
        if(!ws.length) return null;
        const maxW=Math.max(...ws);
        const prev=exHist[ex.name];
        const prevMax=prev&&prev.length>1?prev[prev.length-2].max:null;
        const up=prevMax&&maxW>prevMax, same=prevMax&&maxW===prevMax;
        return {name:ex.name,maxW,prevMax,up,same,done:ex.sets.filter(s=>s.done).length,total:ex.sets.length};
      }).filter(Boolean);

      if(feedbacks.length){
        html+=section('🎯 EJERCICIO POR EJERCICIO','#A78BFA',
          feedbacks.map(f=>`<div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a1a;padding:6px 0">
            <div>
              <span style="color:#ccc;font-size:13px">${f.name}</span><br>
              <span style="font-size:11px;color:#333">${f.done}/${f.total} series</span>
            </div>
            <div style="text-align:right">
              <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;color:${f.up?'#10B981':f.same?'#F59E0B':'#aaa'}">${f.maxW}kg ${f.up?'↑':f.same?'→':''}</div>
              ${f.prevMax?`<div style="font-size:10px;color:#333">ant: ${f.prevMax}kg</div>`:''}
            </div>
          </div>`).join(''));
      }

      html+=section('💡 PARA LA PRÓXIMA SESIÓN','#F59E0B',
        feedbacks.slice(0,3).map(f=>{
          const next=nextWeight(f.maxW);
          return `• <strong style="color:#ddd">${f.name}</strong>: intenta <strong style="color:#F59E0B">${next}kg</strong>`;
        }).join('<br>')+
        '<br><br><span style="color:#444;font-size:11px">Solo sube el peso si completaste todas las series con buena técnica.</span>');
    }
  }

  html+=`<div style="height:24px"></div>`;
  document.getElementById('aiContent').innerHTML=html;
}

function preloadHistory(){
  if(localStorage.getItem('gymRaul_preloaded_v1')) return;
  const hist=[];
  const parseD=d=>{
    const mo={ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
    const p=d.replace(/\./g,'').split(' ');
    return new Date(parseInt(p[2]),mo[p[1]],parseInt(p[0]));
  };
  Object.entries(PRELOAD_DATA).forEach(([diStr,data])=>{
    const di=parseInt(diStr);
    data.dates.forEach((date,si)=>{
      const exercises=data.exs
        .filter(ex=>ex[2][si]>0)
        .map(ex=>({
          name:ex[0],
          sets:Array.from({length:ex[1]},()=>({done:true,weight:String(ex[2][si])}))
        }));
      if(exercises.length>0) hist.push({date,day:di,dayTitle:data.title,exercises});
    });
  });
  // Newest first
  hist.sort((a,b)=>parseD(b.date)-parseD(a.date));
  S.history=hist;
  save('gymRaul_history',hist);
  localStorage.setItem('gymRaul_preloaded_v1','1');
}
